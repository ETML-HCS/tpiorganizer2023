      // Parcourir tous les membres de tpiExperts
      tpiExperts.forEach((expert) => {
      
        // Créer un nouvel élément de liste LI pour chaque expert
        const li = document.createElement("li");

        // Ajouter une classe à chaque élément de liste LI
        li.classList.add("list-group-item");
        const className = expert.role ? expert.role : "externe";
        li.classList.add(className);

        var newExpertValid = false;

        if (className === "externe") {
          if (ext2024.find((name) => name === expert.name)) {
            newExpertValid = true;
            nbLister++
          }
        } else {
          newExpertValid = true;
        }

        if (newExpertValid) {
          // Créer une chaîne HTML contenant les informations de l'expert
          let html_expert =
            "<strong class='name'>" + expert.name + "</strong> <br>";
          html_expert += "<h3 class='email'>" + expert.email + "</h3>";
          html_expert += "<p>Site: " + expert.site + "</p>";
          html_expert += "<p>Date: " + expert.date.$date + "</p>";

          // Ajouter le lien pour visualiser les TPI de l'expert
          const url_prefix =
            "http://tpiorganiser.blue.section-inf.ch/Soutenances/2024?token=";
          const url = url_prefix + expert.token;
          html_expert +=
            "<a href='" + url + "' target='_blank' rel='noopener noreferrer'>";
          html_expert += "Lien pour visualiser mes TPI</a>";

          // Injecter la chaîne HTML dans l'élément de liste LI
          li.innerHTML = html_expert;

          // Ajouter l'élément de liste LI à l'élément UL
          ul_listExperts.appendChild(li);
        }

      function createOutlookButton() {
        // Sélectionne tous les éléments de liste
        var listItems = document.querySelectorAll(".list-group-item");

        // Parcours chaque élément de liste
        listItems.forEach(function (item) {
          // Récupère le nom et l'email
          var name = item.getElementsByClassName("name")[0].textContent;
          var email = item.getElementsByClassName("email")[0].textContent;

          // Récupère l'URL du lien
          var url = item.querySelector("a").getAttribute("href");

          // Crée le corps de l'email au format HTML avec le lien clickable
          var bodyEmail =
            "Bonjour " +
            name +
            "\n\n" +
            "Le lien ci-dessous vous conduit sur le site tpiorganizer en version démonstration qui a pour objectif de moderniser et de faciliter la transmission d'informations liées aux soutenances de TPI de nos élèves." +
            " Pour le moment, seule la fonction 'Mes TPI' et les filtres par classes, dates, candidates et sites fonctionnent correctement." +
            "\n\n" +
            url +
            "\n\nVous pouvez également cliquer sur la petite icône iCal qui permet de télécharger le rendez-vous. N'oubliez pas de l'exécuter afin de donner les accords nécessaires pour l'ajouter à votre agenda." +
            " Cette plateforme offre d'autres avantages qui, pour le moment, sont réservés à quelques personnes. Bien entendu, vous serez informé de toutes les nouveautés.\n" +
            "\nCordialement,\nHelder Costa Lopes";

          // Crée un bouton
          var button = document.createElement("button");
          button.textContent = "Envoyer un email à " + email;
          button.addEventListener("click", function () {
            // Ouvre une fenêtre Outlook avec un email pré-rempli
            window.location.href =
              "mailto:" +
              email +
              "?subject=Soutenance TPI - Informations&body=" +
              encodeURIComponent(bodyEmail);
          });

          // Ajoute le bouton à l'élément de liste
          item.appendChild(button);
        });
      }

      // Appelle la fonction au chargement de la page
      window.onload = createOutlookButton;

      function ouvrirTousLesLiens() {
        // Sélectionne tous les éléments <li> avec la classe "list-group-item"
        const elementsLi = document.querySelectorAll("li.list-group-item");

        // Parcours chaque élément <li> trouvé
        elementsLi.forEach((li) => {
          // Trouve le lien dans cet élément <li>
          const lien = li.querySelector("a");

          // Vérifie si un lien a été trouvé
          if (lien) {
            // Ouvre le lien dans un nouvel onglet
            window.open(lien.href, "_blank");
          }
        });
      }
